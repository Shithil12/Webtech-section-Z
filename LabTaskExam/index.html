<html>
    <head>
        <title>Student Registration</title>
        <link rel="stylesheet" href="style.css"/>
        <script src="script.js"></script>


    </head>
    <body>
        <div id="formContainer">
      <fieldset>
        <legend>Student Registration</legend>
        <form onsubmit="return registerStudent();">
          <table>
            <tr>
        <td class="label">First Name<span class="required">*</span>:</td>
              <td><input type="text" id="fname" /></td>
              <td><p id="fnameError"></p></td>
            </tr>
            <tr>
             <td class="label">Last Name<span class="required">*</span>:</td>
              <td><input type="text" id="lname" /></td>
              <td><p id="lnameError"></p></td>
            </tr>
            <tr>
            </tr>

            <td class="label">Student ID<span class="required">*</span>:</td>
              <td><input type="text" id="sid" /></td>
              <td><p id ="sidError"></p></td><td>
              </td>
              
            <tr>
              <td class="label">Email<span class="required">*</span>:</td>
              <td><input type="text" id="email" /></td>
              <td><p id="emailError"></p></td>
            </tr>
            <tr>  
                <td class="label">Credit Completed<span class="required">*</span>:</td>
              <td><input type="number" id="credit" /></td>
              <td><p id="creditError"></p></td>
            </tr>
            <tr>
              <td class="label">Department<span class="required">*</span>:</td>
              <td>
                <select id ="department">
                    <option value ="">Select Department</option>
                    <option value ="CSE">CSE</option>
                    <option value="EEE">EEE</option>
                  <option value="BBA">BBA</option>
                  <option value="Architecture">Architecture</option>
                </select>
              </td>
              <td><p id="deptError"></p></td>
            </tr>
            <tr>
              <td colspan="3" class="button-center">
                <button type="submit">Submit</button>
              </td>
              

            </tr>
            </table>
            </form>
            </fieldset>
            </div>
            <div id="listContainer">
      <h2>Registered Student List</h2>
      <table id="studentTable" border="1">
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Student ID</th><th>Email</th>
          <th>Credit</th><th>Department</th>
          </tr>
          </table>
          </div>
          

    
    </body>

</html>
