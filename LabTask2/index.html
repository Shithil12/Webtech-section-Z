<!DOCTYPE html>
<html>
<head>
  <title>Student Registration</title>
  
  <!-- CSS অংশ (ডিজাইনের জন্য) -->
  <style>
    body {
      background-color: darkgray; 
      font-family: Arial, sans-serif;
    }

    .container {
      width: 450px;
      margin: 50px auto; 
      background-color: #f4f4f4; 
      padding: 20px;
      border-radius: 8px;
    }

    label {
      font-weight: bold; 
      display: block; /* এটি লেবেলগুলোকে নিচে নিচে আনবে */
      margin-top: 10px;
    }

    input {
      width: 95%;
      padding: 5px;
      margin-top: 3px;
    }

    .star, .error {
      color: red; 
    }

    .error {
      font-size: 13px;
      display: block;
    }

    .btn-center {
      text-align: center; 
      margin-top: 15px;
    }

    button {
      padding: 8px 25px;
      font-size: 16px;
      cursor: pointer;
    }

    table {
      margin-top: 15px;
    }
  </style>

</head>
<body>

  <!-- HTML অংশ (ফর্মের জন্য) -->
  <div class="container">
    <h2 style="text-align: center;">Registration Form</h2>
    
    <form onsubmit="return validateRegistration(event)">
      
      <label>First Name <span class="star">*</span></label>
      <input type="text" id="firstName">
      <span id="firstNameError" class="error"></span>

      <label>Last Name <span class="star">*</span></label>
      <input type="text" id="lastName">
      <span id="lastNameError" class="error"></span>

      <label>Student ID <span class="star">*</span></label>
      <input type="text" id="studentId">
      <span id="studentIdError" class="error"></span>

      <label>Email <span class="star">*</span></label>
      <input type="text" id="email">
      <span id="emailError" class="error"></span>

      <label>Credit Completed <span class="star">*</span></label>
      <input type="number" id="credit">
      <span id="creditError" class="error"></span>

      <label>Department <span class="star">*</span></label>
      <input type="text" id="department">
      <span id="departmentError" class="error"></span>

      <div class="btn-center">
        <button type="submit">Submit</button>
      </div>

    </form>

    <hr>

    <h3 style="text-align: center;">Registered Student List</h3>
    <table border="1" width="100%" style="border-collapse: collapse; text-align: center;">
      <tr>
        <th>Name</th>
        <th>ID</th>
        <th>Email</th>
        <th>Credit</th>
        <th>Dept.</th>
      </tr>
      <tbody id="studentListBody">
      </tbody> 
    </table>
  </div>

  <!-- JavaScript অংশ (লজিকের জন্য) -->
  <script>
    function validateRegistration(event) {
      event.preventDefault(); 

      const fName = document.getElementById("firstName").value;
      const lName = document.getElementById("lastName").value;
      const id = document.getElementById("studentId").value;
      const email = document.getElementById("email").value;
      const credit = document.getElementById("credit").value;
      const dept = document.getElementById("department").value;

      let hasError = false; 

      if (!fName) { 
        document.getElementById("firstNameError").innerHTML = "First name is required"; 
        hasError = true; 
      } else { document.getElementById("firstNameError").innerHTML = ""; }

      if (!lName) { 
        document.getElementById("lastNameError").innerHTML = "Last name is required"; 
        hasError = true; 
      } else { document.getElementById("lastNameError").innerHTML = ""; }

      if (!id || !id.includes("_")) { 
        document.getElementById("studentIdError").innerHTML = "Student ID must contain '_'"; 
        hasError = true; 
      } else { document.getElementById("studentIdError").innerHTML = ""; }

      if (!email || !email.includes("@student.aiub.edu")) { 
        document.getElementById("emailError").innerHTML = "Email must contain @student.aiub.edu"; 
        hasError = true; 
      } else { document.getElementById("emailError").innerHTML = ""; }

      if (!credit || credit < 0 || credit >= 148) { 
        document.getElementById("creditError").innerHTML = "Credit must be 0 or more but less than 148"; 
        hasError = true; 
      } else { document.getElementById("creditError").innerHTML = ""; }

      if (!dept) { 
        document.getElementById("departmentError").innerHTML = "Department is required"; 
        hasError = true; 
      } else { document.getElementById("departmentError").innerHTML = ""; }

      if (!hasError) {
        const table = document.getElementById("studentListBody");
        const row = table.insertRow();
        
        row.innerHTML = `<td>${fName} ${lName}</td> <td>${id}</td> <td>${email}</td> <td>${credit}</td> <td>${dept}</td>`;

        document.querySelector("form").reset();
      }

      return false;
    }
  </script>

</body>
</html>
